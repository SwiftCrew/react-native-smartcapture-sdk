org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError
org.gradle.parallel=true
android.useAndroidX=true
android.enableJetifier=true

# Required by react-native-vision-camera (Camera2 / CameraX)
newArchEnabled=false
hermesEnabled=true

# react-native-permissions: list the permissions we will request so the
# library's auto-link helper enables only the corresponding native modules.
PERMISSIONS_camera=true
PERMISSIONS_storage=true
PERMISSIONS_mediaLibrary=true
